<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/lmt/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="lmt">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>lmt</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
  <script>
      // Called by Flutter to register a one-time paste listener
      window._pendingPasteResolve = null;

      window.listenForPaste = function() {
        return new Promise((resolve) => {
          window._pendingPasteResolve = resolve;
        });
      };

      document.addEventListener('paste', function(e) {
        if (!window._pendingPasteResolve) return;

        e.preventDefault();
        e.stopPropagation();

        const resolve = window._pendingPasteResolve;
        window._pendingPasteResolve = null;

        // ✅ Priority 1: e.clipboardData.files (Telegram macOS, screenshots, file copies)
        const files = e.clipboardData.files;
        if (files && files.length > 0) {
          const file = files[0];
          if (file.type.startsWith('image/')) {
            const reader = new FileReader();
            reader.onload = function(ev) { resolve(ev.target.result); }; // base64 data URL
            reader.readAsDataURL(file);
            return;
          }
        }

        // ✅ Priority 2: e.clipboardData.items (browser copy image)
        const items = e.clipboardData.items;
        if (items) {
          for (let i = 0; i < items.length; i++) {
            if (items[i].type.startsWith('image/')) {
              const blob = items[i].getAsFile();
              if (blob) {
                const reader = new FileReader();
                reader.onload = function(ev) { resolve(ev.target.result); };
                reader.readAsDataURL(blob);
                return;
              }
            }
          }
        }

        resolve(null); // nothing useful in clipboard
      });
    </script>
  </body>
</html>
